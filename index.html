    .shaka-video-container {

/* Logo overlay - Responsive */
.video-logo {

  top: 10px;
  left: 10px;
  opacity: 0.8;
  z-index: 1000;

  /* Responsive sizing */
  width: clamp(50px, 12vw, 65px);
  height: auto;
  aspect-ratio: 65/20; /* Maintain original aspect ratio */
}

/* Desktop - larger screens */
@media (min-width: 768px) {
  .video-logo {
    width: clamp(65px, 8vw, 80px);

    left: 15px;
  }
}

/* Large desktop screens */
@media (min-width: 1200px) {
  .video-logo {
    width: clamp(80px, 6vw, 100px);
    top: 20px;
    left: 20px;
  }
}

/* Mobile - smaller screens */
@media (max-width: 480px) {
  .video-logo {

    left: 8px;
  }
}

/* Very small screens */
@media (max-width: 320px) {
